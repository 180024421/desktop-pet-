<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Desktop Pet</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="root" class="mode-full" role="img" aria-label="桌面宠物">
    <div id="pet-scale">
      <img id="pet-img" alt="pet" draggable="false" />
    </div>
    <button id="drag-handle" type="button" class="hidden" title="拖拽移动" aria-label="拖拽手柄">⠿</button>
    <div id="bubble" class="hidden" role="status" aria-live="polite"></div>
    <div id="affection" class="hidden" aria-hidden="true">
      <div id="affection-bar"></div>
    </div>
    <div id="pomodoro-widget" class="hidden" aria-label="番茄钟">
      <span id="pomodoro-time">25:00</span>
      <button id="pomodoro-start" type="button" aria-label="开始番茄钟">▶</button>
    </div>
    <div id="hint">滚轮缩放 · 右键菜单 · Ctrl+Shift+P 显示/隐藏</div>
  </div>
  <script src="pet.js"></script>
  <script src="pet-extras.js"></script>
  <script src="pet-features.js"></script>
</body>
</html>
